<!DOCTYPE html>
<html>
<head>
    <title>BMI Health Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        input { padding: 10px; margin: 10px; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #28a745; color: white; border: none; }
    </style>
</head>
<body>
    <h2>BMI Health Risk Predictor</h2>
    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (cm)">
    <br>
    <button onclick="predictBMI()">Check Health Status</button>
    <h3 id="result"></h3>

    <script>
        async function predictBMI() {
            const weight = document.getElementById('weight').value;
            const height = document.getElementById('height').value;
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({'weight': weight, 'height': height})
            });
            const data = await response.json();
            if(data.bmi) {
                document.getElementById('result').innerText = 'Your BMI is: ' + data.bmi;
            } else {
                document.getElementById('result').innerText = 'Error: ' + data.error;
            }
        }
    </script>
</body>
</html>
